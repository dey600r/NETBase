nameOverride: ""

# DEPLOYMENT CONFIG
deployment:
  replicas: 1
  annotations: 
    connectsTo:
      - apiVersion: apps/v1
        kind: Deployment
        name: keycloak
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-microfrontend-angular-maintenance
  labels:
    runtime: angularjs
  image:
    repository: image-registry.openshift-image-registry.svc:5000
    tag: keycloak
  resources:
    limits:
      ephemeral-storage: 8Gi
    requests:
      ephemeral-storage: 4Gi
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 25%
        maxSurge: 25%
  policy: Always

# BUILD CONFIG
build:
  source:
      type: Git
      git:
        uri: 'https://github.com/dey600r/NETBase.git'
        ref: master
  triggers:
      type: ConfigChange

# SERVICE
service:
  type: ClusterIP
  port: 3300
  protocol: TCP
  portName: fr-contain-port

#ROUTE
route:
  enabled: true
  domain: "apps-crc.testing"

#CONFIGMAP
configmap:
  enabled: true
  volume: true
  mountPath: /usr/share/nginx/html/assets/
  data:
    config.json: |
      {
        "apiUrl": "https://microservice-gateway.apps-crc.testing",
        "keycloak": {
            "enable": true,
            "url": "https://keycloak-microservices.apps-crc.testing",
            "realm": "microservices",
            "clientId": "frontend",
            "onLoad": "login-required",
        },
        "remotes": [
          {
              "name": "security-module",
              "remoteEntry": "https://microfrontend-angular-security.apps-crc.testing/remoteEntry.js",
              "exposedModule": "./routes"
          },
          {
              "name": "vehicle-module",
              "remoteEntry": "https://microfrontend-angular-vehicle.apps-crc.testing/remoteEntry.js",
              "exposedModule": "./routes"
          },
          {
              "name": "maintenance-module",
              "remoteEntry": "https://microfrontend-angular-maintenance.apps-crc.testing/remoteEntry.js",
              "exposedModule": "./routes"
          },
          {
              "name": "setting_module",
              "remoteEntry": "https://microfrontend-react-setting.apps-crc.testing/remoteEntry.js",
              "exposedModule": "./component"
          },
          {
              "name": "home_module",
              "remoteEntry": "https://microfrontend-vue-home.apps-crc.testing/remoteEntry.js",
              "exposedModule": "./component"
          }
        ]
      }

#SECRET
secret:
  enabled: false