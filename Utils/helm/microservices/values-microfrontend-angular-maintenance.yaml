nameOverride: ""

# DEPLOYMENT CONFIG
deployment:
  replicas: 1
  annotations: 
    connectsTo:
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-microservice-gateway
  labels:
    runtime: angularjs
  image:
    repository: image-registry.openshift-image-registry.svc:5000
    tag: latest
  resources:
    limits:
      ephemeral-storage: 8Gi
    requests:
      ephemeral-storage: 4Gi
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 25%
        maxSurge: 25%
  policy: Always

# BUILD CONFIG
build:
  source:
      type: Git
      git:
        uri: 'https://github.com/dey600r/NETBase.git'
        ref: master
  triggers:
      type: ConfigChange

# SERVICE
service:
  type: ClusterIP
  port: 3300
  protocol: TCP
  portName: fr-maint-port

#ROUTE
route:
  enabled: true
  domain: "apps-crc.testing"

#CONFIGMAPS
configmapEnv:
  enabled: false

configmapVolume:
  enabled: true
  mountPath: /usr/share/nginx/html/assets/
  subPath: config.json
  data:
    config.json: |
      {
        "apiUrl": "https://microservice-gateway.apps-crc.testing",
        "keycloak": {
            "enable": true,
            "url": "https://keycloak-microservices.apps-crc.testing",
            "realm": "microservices",
            "clientId": "frontend",
            "onLoad": "login-required"
        },
        "remotes": [
          {
              "name": "security-module",
              "remoteEntry": "https://microfrontend-angular-security.apps-crc.testing/remoteEntry.js",
              "exposedModule": "./routes"
          }
        ]
      }

#SECRET
secret:
  enabled: false