nameOverride: ""

# DEPLOYMENT CONFIG
deployment:
  replicas: 1
  annotations: 
    connectsTo:
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-sql-server
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-rabbitmq
  labels:
    runtime: dotnet
  image:
    repository: image-registry.openshift-image-registry.svc:5000
    tag: latest
  resources:
    limits:
      ephemeral-storage: 8Gi
    requests:
      ephemeral-storage: 4Gi
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 25%
        maxSurge: 25%
  policy: Always

# BUILD CONFIG
build:
  source:
      type: Git
      git:
        uri: 'https://github.com/dey600r/NETBase.git'
        ref: master
  triggers:
      type: ConfigChange

# SERVICE
service:
  type: ClusterIP
  port: 8080
  protocol: TCP
  portName: maint-port

#ROUTE
route:
  enabled: false
  domain: "apps-crc.testing"

#CONFIGMAPS
configmapEnv:
  enabled: true
  data:
    ConnectionStrings__Encripted: "true" 
    RabbitMQSettings__Host: "svc-rabbitmq.microservices.svc.cluster.local"
    RabbitMQSettings__ServiceName: "Processor"
    RabbitMQSettings__Port: "15672"
    RabbitMQSettings__VHost: "/"
    RabbitMQSettings__SslOptionsEnabled: "false"
    RabbitMQSettings__User: "guest"
    RabbitMQSettings__Pwd: "guest"
    Keycloak__Authority: "https://keycloak.apps-crc.testing/realms/microservices"
    Keycloak__AuthorizationUrl: "https://keycloak.apps-crc.testing/realms/microservices/.well-known/openid-configuration"
    Keycloak__TokenUrl: "https://keycloak.apps-crc.testing/realms/microservices/protocol/openid-connect/token"
    Keycloak__Realm: "microservices"
    Keycloak__ClientId: "backend"
    keycloakEnabled: "true"

configmapVolume:
  enabled: false

#SECRET
secret:
  enabled: true
  data:
