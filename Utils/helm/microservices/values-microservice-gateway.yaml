nameOverride: ""

# DEPLOYMENT CONFIG
deployment:
  replicas: 1
  annotations: 
    connectsTo:
      - apiVersion: apps/v1
        kind: Deployment
        name: keycloak
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-microservice-maintenance
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-microservice-vehicle
      - apiVersion: apps/v1
        kind: Deployment
        name: dp-microservice-security
  labels:
    runtime: dotnet
  image:
    repository: image-registry.openshift-image-registry.svc:5000
    tag: latest
  resources:
    limits:
      ephemeral-storage: 8Gi
    requests:
      ephemeral-storage: 4Gi
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 25%
        maxSurge: 25%
  policy: Always

# BUILD CONFIG
build:
  source:
      type: Git
      git:
        uri: 'https://github.com/dey600r/NETBase.git'
        ref: master
  triggers:
      type: ConfigChange

# SERVICE
service:
  type: ClusterIP
  port: 8080
  protocol: TCP
  portName: gateway-port

#ROUTE
route:
  enabled: true
  domain: "apps-crc.testing"

#CONFIGMAP
configmap:
  enabled: true
  volume: false
  mountPath: 
  data:
    Keycloak__Authority: "https://keycloak-microservices.apps-crc.testing/realms/microservices"
    Keycloak__AuthorizationUrl: "https://keycloak-microservices.apps-crc.testing/realms/microservices/.well-known/openid-configuration"
    Keycloak__TokenUrl: "https://keycloak-microservices.apps-crc.testing/realms/microservices/protocol/openid-connect/token"
    Keycloak__Realm: "microservices"
    Keycloak__ClientId: "backend"
    keycloakEnabled: "true"

#SECRET
secret:
  enabled: true
  data:
    Keycloak__PublicKey: ""