nameOverride: ""

# DEPLOYMENT CONFIG
deployment:
  replicas: 1
  labels:
    runtime: mssql
  image:
    repository: image-registry.openshift-image-registry.svc:5000
  env:
    - name: MSSQL_SA_PASSWORD
      value: PassWord123?
    - name: ACCEPT_EULA
      value: 'Y'
    - name: MSSQL_PID
      value: Developer
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 25%
        maxSurge: 25%
  policy: Always
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE

# IMAGE STREAM
imageStream:
  tag: latest
  from:
    kind: DockerImage
    name: mcr.microsoft.com/mssql/server:2022-latest
  importPolicy: Legacy
  referencePolicy: Local

# SERVICE
service:
  ports:
    - name: sql-server-tcp
      protocol: TCP
      port: 1433
      targetPort: 1433
    

#ROUTE
route:
  enabled: true
  domain: "apps-crc.testing"

#PERSISTANCE CLAIM
persistenceClaim:
  enabled: true
  name: sql-server-path
  claimName: pvc-database
  mountPaths:
    - /var/opt/mssql
