kind: ImageStream
apiVersion: image.openshift.io/v1
metadata:
  name: is-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  tags:
    - name: {{ .Values.imageStream.tag }}
      from:
        kind: {{ .Values.imageStream.from.kind }}
        name: {{ .Values.imageStream.from.name }}
      importPolicy:
        importMode: {{ .Values.imageStream.importPolicy }}
      referencePolicy:
        type: {{ .Values.imageStream.referencePolicy }}